version: '3.8'

services:
  # ============== MySQL ==============
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: rd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-DevPass2026rd}
      MYSQL_DATABASE: ${DB_NAME:-rd_system}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - rd-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============== Redis ==============
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: rd-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - rd-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============== Backend ==============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rd-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-rd_system}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-DevPass2026rd}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET}
      WEWORK_CORP_ID: ${WEWORK_CORP_ID:-}
      WEWORK_AGENT_ID: ${WEWORK_AGENT_ID:-}
      WEWORK_SECRET: ${WEWORK_SECRET:-}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rd-network
    volumes:
      - ./uploads:/app/uploads

  # ============== Frontend ==============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rd-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - rd-network

volumes:
  mysql-data:
  redis-data:

networks:
  rd-network:
    driver: bridge
