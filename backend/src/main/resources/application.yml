server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: instrument-rd-system

  # ============== DataSource ==============
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:rd_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ============== Redis ==============
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # ============== Flyway ==============
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

# ============== MyBatis Plus ==============
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.RD.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============== JWT ==============
jwt:
  secret: ${JWT_SECRET}
  expiration: 7200000          # 2h
  refresh-expiration: 604800000 # 7d

# ============== 企业微信 ==============
wework:
  corp-id: ${WEWORK_CORP_ID:}
  agent-id: ${WEWORK_AGENT_ID:}
  secret: ${WEWORK_SECRET:}
  message:
    enabled: ${WEWORK_MESSAGE_ENABLED:true}
    retry-times: 3
    timeout-warning-minutes: 60

# ============== 前端基础 URL（OAuth 回调重定向） ==============
app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

# ============== 敏感数据脱敏 ==============
sensitive-data:
  enabled: ${SENSITIVE_DATA_ENABLED:true}

# ============== 归档（冷热数据分离） ==============
archive:
  enabled: ${ARCHIVE_ENABLED:true}
  cron: ${ARCHIVE_CRON:0 0 3 1 * ?}
  batch-size: ${ARCHIVE_BATCH_SIZE:1000}
  interval-months: ${ARCHIVE_INTERVAL_MONTHS:12}
  max-runtime-minutes: ${ARCHIVE_MAX_RUNTIME:180}
  lock-key: "rd:archive:lock"
  lock-expire-seconds: 3600

# ============== 对象存储 ==============
storage:
  type: ${STORAGE_TYPE:local}
  local:
    path: ${STORAGE_LOCAL_PATH:./uploads}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:rd-files}
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket: ${OSS_BUCKET:}

# ============== Flowable 7.1.0（ECN 审批流） ==============
flowable:
  # 不自动部署 resources/processes 下的流程定义（避免重启时覆盖运行时）
  process-definition-location-prefix:
  process-definition-location-suffixes:
  # 不自动启动 Async Executor（Phase 1 暂用同步执行，后续异步化）
  async-executor:
    enabled: true
    core-pool-size: 8
    max-pool-size: 16
    queue-capacity: 200
  # 数据库表策略：让 Flowable 自动建表（保证跟 7.1.0 版本严格匹配）
  # 我们的业务表由 Flyway V1 管控；Flowable 自己管 ACT_* 表
  # 业务复合索引由 Flyway V2 在 Flowable 建表后追加
  database-schema-update: true
  # 关闭 Flowable 自带的 REST API（自定义接口为主）
  rest:
    app:
      enabled: false
    admin:
      enabled: false

# ============== Logging ==============
logging:
  level:
    root: INFO
    com.RD: DEBUG
    org.flowable: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
